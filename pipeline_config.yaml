# pipeline_config.yaml
# Copy this file to: E:/pilot_study/configs/pipeline_config.yaml

project_root: "E:/pilot_study"

devices:
  polar:
    name: "Polar H10"
    signals: ["ecg", "hrv"]
    sampling_rate: 130
  empatica:
    name: "Empatica EmbracePlus"
    signals: ["eda", "hr", "temp", "accel"]
    sampling_rate: null
  muse:
    name: "Muse 2"
    signals: ["eeg"]
    sampling_rate: 256
  respiban:
    name: "respiBAN"
    signals: ["resp", "ecg", "imu"]
    sampling_rate: null
  masimo:
    name: "Masimo MightySat"
    signals: ["spo2", "pulse"]
    sampling_rate: 1
  geneactiv:
    name: "GENEActiv"
    signals: ["actigraphy", "light"]
    sampling_rate: null
  ontrak:
    name: "OnTrak ABPM"
    signals: ["bp"]
    sampling_rate: null
  ema:
    name: "EMA (Phone/REDCap)"
    signals: ["responses"]
    sampling_rate: null

quality:
  hr_min: 30
  hr_max: 220
  spo2_min: 70
  spo2_max: 100
  eda_min: 0.01
  eda_max: 100
  temp_min: 25
  temp_max: 42
  systolic_bp_min: 60
  systolic_bp_max: 250
  diastolic_bp_min: 30
  diastolic_bp_max: 150
  max_gap_seconds:
    polar: 2
    empatica: 5
    muse: 2
    respiban: 2
    masimo: 30
    geneactiv: 5

output:
  format: "parquet"
  compression: "snappy"
